kind = "web"
previewPath = "/"
title = "FindX - Business Prospecting"
version = "1.0.0"
id = "artifacts/findx"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23646

[services.development]
run = "pnpm --filter @workspace/findx run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/findx", "run", "build" ]
publicDir = "artifacts/findx/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23646"
BASE_PATH = "/"
