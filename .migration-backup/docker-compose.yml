services:
  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: findx
      POSTGRES_PASSWORD: findx
      POSTGRES_DB: findx
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  lightpanda:
    image: lightpanda/browser:nightly
    ports:
      - "9222:9222"
    command: ["/usr/bin/lightpanda", "serve", "--host", "0.0.0.0", "--port", "9222"]
    restart: unless-stopped

  searxng:
    image: searxng/searxng:latest
    ports:
      - "8080:8080"
    volumes:
      - ./searxng/settings.yml:/etc/searxng/settings.yml:ro
    environment:
      SEARXNG_BASE_URL: "http://localhost:8080/"
    restart: unless-stopped

volumes:
  pgdata:
