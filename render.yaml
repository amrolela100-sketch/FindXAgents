services:
  # ─── Redis (rate-limiting shared across all API instances) ──────────────────
  - type: redis
    name: findx-redis
    region: frankfurt
    plan: free                 # 25 MB — enough for rate-limit counters
    maxmemoryPolicy: allkeys-lru

  # ─── Backend API ────────────────────────────────────────────────────────────
  - type: web
    name: findx-api
    runtime: node
    region: frankfurt          # closest to Netherlands (target market)
    plan: free

    rootDir: .                 # root of repo — needed for pnpm monorepo
    buildCommand: npm install -g pnpm@10 && pnpm install --no-frozen-lockfile && pnpm --filter @workspace/api-server run build
    startCommand: node --enable-source-maps ./artifacts/api-server/dist/index.mjs

    healthCheckPath: /api/healthz

    envVars:
      # ── Required ──────────────────────────────────────────────────────────
      - key: NODE_ENV
        value: production

      - key: PORT
        value: "3000"

      - key: DATABASE_URL
        sync: false            # ← set manually in Render dashboard

      - key: SUPABASE_URL
        sync: false

      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false

      # ── Redis (rate-limiting) ─────────────────────────────────────────────
      # Auto-populated by Render when both services are in the same render.yaml
      - key: REDIS_URL
        fromService:
          name: findx-redis
          type: redis
          property: connectionString

      # ── Owner access / secret encryption ─────────────────────────────────
      - key: OWNER_EMAIL
        sync: false            # your email address

      - key: OWNER_PASSWORD
        sync: false            # strong secondary password for /owner panel

      - key: SECRET_ENCRYPTION_KEY
        sync: false            # generate with: openssl rand -base64 32


      - key: INTERNAL_JOB_SECRET
        sync: false            # shared secret for internal job worker endpoint

      - key: QSTASH_TOKEN
        sync: false            # optional; use when enqueueing through Upstash QStash

      - key: JOB_WORKER_URL
        sync: false            # e.g. https://findx-api.onrender.com

      # ── Frontend origin (CORS) ────────────────────────────────────────────
      - key: FRONTEND_URL
        sync: false            # e.g. https://findx.vercel.app

      # ── AI & Search (optional but recommended) ───────────────────────────
      - key: OPENROUTER_API_KEY
        sync: false

      - key: GEMINI_API_KEY
        sync: false

      - key: TAVILY_API_KEY
        sync: false

      # ── Lead discovery ─────────────────────────────────────────────────────
      - key: KVK_API_KEY
        sync: false

      - key: GOOGLE_MAPS_API_KEY
        sync: false

      # ── Email sending ──────────────────────────────────────────────────────
      - key: RESEND_API_KEY
        sync: false

      # ── Skip DB migrations on every deploy (run once manually) ────────────
      - key: SKIP_MIGRATIONS
        value: "false"         # set to "true" after first successful deploy
