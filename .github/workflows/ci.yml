name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: CI / Lint & Format Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: "10" }
      - uses: actions/setup-node@v4
        with: { node-version: "22", cache: "pnpm" }
      - run: pnpm install --no-frozen-lockfile
      - name: Prettier check
        continue-on-error: true
        run: pnpm exec prettier --check "**/*.{ts,tsx,js,json,css,md}" --ignore-path .prettierignore

  test:
    name: CI / Typecheck & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: "10" }
      - uses: actions/setup-node@v4
        with: { node-version: "22", cache: "pnpm" }
      - run: pnpm install --no-frozen-lockfile
      - name: Run Typecheck
        run: |
          pnpm --filter "./lib/**" run build
          pnpm exec tsc --build
          pnpm -r --filter "./artifacts/**" run typecheck
      - name: Run Tests with Coverage
        run: pnpm test -- --coverage
      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage/
          retention-days: 7

  build:
    name: CI / Build Verification (core)
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: "10" }
      - uses: actions/setup-node@v4
        with: { node-version: "22", cache: "pnpm" }
      - run: pnpm install --no-frozen-lockfile
      - name: Build core
        run: pnpm run build:core
        env:
          VITE_SUPABASE_URL: https://placeholder.supabase.co
          VITE_SUPABASE_ANON_KEY: placeholder-anon-key
          VITE_API_URL: /api
