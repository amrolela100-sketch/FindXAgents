name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: CI / Lint & Format Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: "10" }
      - uses: actions/setup-node@v4
        with: { node-version: "22", cache: "pnpm" }
      # LOW-14 fix: use --frozen-lockfile to prevent silent dependency drift.
      # If pnpm-lock.yaml is out of sync with package.json, CI fails instead of
      # silently installing a different version than production uses.
      - run: pnpm install --frozen-lockfile
      - name: Prettier check
        continue-on-error: true
        run: pnpm exec prettier --check "**/*.{ts,tsx,js,json,css,md}" --ignore-path .prettierignore
      # LOW-8 fix: audit dependencies for known vulnerabilities on every PR.
      # --audit-level=high fails CI only for high/critical CVEs (ignores moderate/low noise).
      - name: Security audit
        run: pnpm audit --audit-level=high
        continue-on-error: true

  test:
    name: CI / Typecheck & Test
    runs-on: ubuntu-latest

    # Real Postgres + Redis services — required for health check probes
    # and any future integration tests that hit the DB directly.
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: testdb
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U test -d testdb"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: "10" }
      - uses: actions/setup-node@v4
        with: { node-version: "22", cache: "pnpm" }
      - run: pnpm install --frozen-lockfile
      - name: Run Typecheck
        run: |
          pnpm --filter "./lib/**" run build
          pnpm exec tsc --build
          pnpm -r --filter "./artifacts/**" run typecheck
      - name: Run Tests with Coverage
        run: pnpm test -- --coverage
        env:
          NODE_ENV: test
          DATABASE_URL: postgresql://test:test@localhost:5432/testdb
          REDIS_URL: redis://localhost:6379
      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage/
          retention-days: 7

  build:
    name: CI / Build Verification (core)
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: "10" }
      - uses: actions/setup-node@v4
        with: { node-version: "22", cache: "pnpm" }
      - run: pnpm install --frozen-lockfile
      - name: Build core
        run: pnpm run build:core
        env:
          VITE_SUPABASE_URL: https://placeholder.supabase.co
          VITE_SUPABASE_ANON_KEY: placeholder-anon-key
          VITE_API_URL: /api
